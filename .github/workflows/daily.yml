name: Daily Brief

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 8:00 AR (UTC-3), Mon-Fri. El wizard ajusta esto al tz del user.
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      # TODO Fase II: cambiar a TestPyPI temporalmente para validación end-to-end:
      #   pip install -i https://test.pypi.org/simple/ -U dilux-news
      # En Fase III (publicación pública), volver a PyPI real:
      - run: pip install -U dilux-news

      - run: dilux-news validate
      - run: dilux-news run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "brief: auto"
          file_pattern: "briefs/*.md briefs/feed.xml SETUP_PENDIENTE.md"
