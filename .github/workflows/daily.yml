name: Daily Brief

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 8:00 AR (UTC-3), Mon-Fri. El wizard ajusta esto al tz del user.
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      # Fase II: TestPyPI temporal para validación end-to-end.
      # --extra-index-url apunta a PyPI real para resolver feedparser/pyyaml/requests
      # (TestPyPI no espeja deps). En Fase III revertir a `pip install -U dilux-news`.
      - run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            -U dilux-news

      - run: dilux-news validate

      - run: dilux-news run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit brief
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Archivo por archivo: git add con múltiples paths falla TODO si
          # uno no existe (no stagea nada). Loop separado evita eso.
          for f in briefs/ SETUP_PENDIENTE.md; do
            git add "$f" 2>/dev/null || true
          done
          if git diff --cached --quiet; then
            echo "nada para commitear"
            exit 0
          fi
          git commit -m "brief: auto"
          git push
